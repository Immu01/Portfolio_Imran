<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - Imran Shaik</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background-color: #000; color: #fff; font-family: sans-serif; }

        /* Initial Screen */
        #intro-screen {
            height: 100vh; display: flex; justify-content: center; align-items: center;
            animation: fadeOut 1s ease-in-out 3s forwards;
        }
        #name-reveal { font-size: 3rem; opacity: 0; animation: fadeIn 1s ease-in-out forwards; }
        #photo-reveal { width: 200px; opacity: 0; animation: fadeIn 1s ease-in-out 1.2s forwards; margin-left: 20px; }

        /* Hero Page */
        #hero-page {
            display: none; height: 100vh; display: flex; align-items: center; justify-content: space-between;
            padding: 0 10%; opacity: 0; animation: fadeIn 1.5s ease-in-out 3.5s forwards;
        }
        .hero-left { font-size: 4rem; }
        .hero-right img { width: 300px; border-radius: 8px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; display: none; } }
    </style>
</head>
<body>

    <div id="intro-screen">
        <div id="name-reveal">Imran Shaik</div>
        <img id="photo-reveal" src="https://lh3.googleusercontent.com/d/1vumgZcnBpR4F5D23oCGGYAKNldd6phZO" alt="Imran Shaik">
    </div>

    <div id="hero-page">
        <div class="hero-left">Imran Shaik</div>
        <div class="hero-right"><img src="https://lh3.googleusercontent.com/d/1vumgZcnBpR4F5D23oCGGYAKNldd6phZO" alt="Imran Shaik"></div>
    </div>

    <script>
        // Transition to hero page after animation
        setTimeout(() => {
            document.getElementById('intro-screen').style.display = 'none';
            document.getElementById('hero-page').style.display = 'flex';
        }, 4000);
    </script>
</body>
</html>
